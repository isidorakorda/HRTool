<div class="page-wrapper">
    <aside class="sidebar">
        <h3>Filter by Skills</h3>
        <div class="skills-scroll-container">
            <div *ngFor="let skill of skills" class="skill-filter-item">
                <label>
                    <input type="checkbox" [checked]="selectedSkillIds.includes(skill.id)"
                        (change)="toggleSkill(skill.id)">
                    {{ skill.name }}
                </label>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="list-header">
            <h2>All Candidates</h2>
            <div class="search-box">
                <input type="text" [(ngModel)]="searchName" (input)="onSearchChange()"
                    placeholder="Search by name..." />
            </div>
        </div>
        <div class="candidate-grid">
            <div *ngFor="let candidate of candidates" class="candidate-card">
                <div class="card-header">
                    <h3>{{ candidate.name }}</h3>
                    <span class="dob">{{ candidate.dateOfBirth }}</span>
                </div>

                <div class="card-details">
                    <div class="contact-info">
                        <div class="info-row">
                            <strong>Email:</strong> {{ candidate.email }}
                        </div>
                        <div class="info-row">
                            <strong>Phone:</strong> {{ candidate.phone }}
                        </div>
                    </div>

                    <div class="action-bar">
                        <button class="edit-btn" (click)="onEdit(candidate)">
                            Update
                        </button>
                        <button class="delete-card-btn" (click)="onDelete(candidate.id)">
                            Delete
                        </button>
                    </div>

                    <div class="skills-section">
                        <p class="section-label">Skills:</p>
                        <div class="skill-tags">
                            <span *ngFor="let skill of candidate.skills" class="skill-tag">
                                {{ skill.name }}
                            </span>
                            <span *ngIf="candidate.skills.length === 0" class="no-skills-text">
                                No skills assigned
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>


<app-update-candidate *ngIf="showUpdatePopup" [candidate]="selectedCandidate" (close)="closePopup()"
    (updated)="handleUpdateSuccess()">
</app-update-candidate>
