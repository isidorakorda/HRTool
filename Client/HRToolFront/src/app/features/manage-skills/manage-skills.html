<div class="manage-skills-container">
    <div class="form-section">
        <h2>Add New Skill</h2>
        <form [formGroup]="skillForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="name">Skill Name</label>
                <input id="name" type="text" formControlName="name" placeholder="Enter a Skill Name" />

                <div *ngIf="skillForm.get('name')?.invalid && skillForm.get('name')?.touched" class="error">
                    <small *ngIf="skillForm.get('name')?.errors?.['required']">Name is required.</small>
                    <small *ngIf="skillForm.get('name')?.errors?.['minlength']">Minimum 2 characters.</small>
                </div>
            </div>
            <button type="submit" [disabled]="skillForm.invalid">Save Skill</button>
        </form>
    </div>

    <div class="list-section">
        <h2>Existing Skills</h2>
        <div class="skill-list">
            <div *ngFor="let skill of skills" class="skill-item">
                <span>{{ skill.name }}</span>
                <button class="delete-btn" (click)="onDelete(skill.id)">Delete</button>
            </div>
            <p *ngIf="skills.length === 0">No skills added yet.</p>
        </div>
    </div>
</div>
